<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Post - Shiro</title>
    <link rel="stylesheet" href="css/upload.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Cropper.js for image editing -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <div class="logo-circle"></div>
                    <div class="logo-dot"></div>
                </div>
                <span class="logo-text">shiro</span>
            </a>
            
            <h1 class="page-title">Create New Post</h1>
            
            <div class="nav-actions">
                <button class="btn-close" onclick="window.location.href='index.html'">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Upload Container -->
    <main class="upload-container">
        <!-- Left Side - Preview/Edit Area -->
        <div class="upload-left">
            <div class="upload-area" id="uploadArea">
                <div class="upload-placeholder" id="uploadPlaceholder">
                    <div class="upload-icon">
                        <i class="fas fa-cloud-upload-alt"></i>
                    </div>
                    <h3>Drag photos and videos here</h3>
                    <p>or click to browse from your computer</p>
                    <button class="btn-select" onclick="document.getElementById('fileInput').click()">
                        Select from computer
                    </button>
                    <input type="file" id="fileInput" hidden accept="image/*,video/*" multiple>
                </div>
                
                <div class="preview-container" id="previewContainer" style="display: none;">
                    <div class="media-preview" id="mediaPreview">
                        <!-- Media will be loaded here -->
                    </div>
                    
                    <!-- Editing Tools -->
                    <div class="edit-tools" id="editTools" style="display: none;">
                        <button class="tool-btn" onclick="rotateImage(-90)" title="Rotate Left">
                            <i class="fas fa-undo"></i>
                        </button>
                        <button class="tool-btn" onclick="rotateImage(90)" title="Rotate Right">
                            <i class="fas fa-redo"></i>
                        </button>
                        <button class="tool-btn" onclick="toggleCrop()" title="Crop">
                            <i class="fas fa-crop-alt"></i>
                        </button>
                        <button class="tool-btn" onclick="resetEdit()" title="Reset">
                            <i class="fas fa-undo-alt"></i>
                        </button>
                    </div>
                    
                    <!-- Video Controls -->
                    <div class="video-controls" id="videoControls" style="display: none;">
                        <button class="tool-btn" onclick="togglePlay()" title="Play/Pause">
                            <i class="fas fa-play" id="playIcon"></i>
                        </button>
                        <div class="video-trim">
                            <span>Trim:</span>
                            <input type="range" id="trimStart" min="0" max="100" value="0">
                            <input type="range" id="trimEnd" min="0" max="100" value="100">
                        </div>
                    </div>
                    
                    <!-- Navigation for multiple files -->
                    <div class="file-nav" id="fileNav" style="display: none;">
                        <button class="nav-btn" onclick="prevFile()">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <span id="fileCounter">1 / 1</span>
                        <button class="nav-btn" onclick="nextFile()">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                    
                    <!-- Remove button -->
                    <button class="btn-remove" onclick="removeCurrentFile()">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
                
                <!-- Drag overlay -->
                <div class="drag-overlay" id="dragOverlay">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Drop files here</span>
                </div>
            </div>
            
            <!-- Aspect Ratio Selector -->
            <div class="aspect-ratio-selector" id="aspectRatioSelector" style="display: none;">
                <span>Aspect Ratio:</span>
                <button class="ratio-btn active" data-ratio="1" onclick="setAspectRatio(1)">
                    <i class="fas fa-square"></i> 1:1
                </button>
                <button class="ratio-btn" data-ratio="0.8" onclick="setAspectRatio(0.8)">
                    <i class="fas fa-portrait"></i> 4:5
                </button>
                <button class="ratio-btn" data-ratio="1.77" onclick="setAspectRatio(1.77)">
                    <i class="fas fa-video"></i> 16:9
                </button>
                <button class="ratio-btn" data-ratio="0.5625" onclick="setAspectRatio(0.5625)">
                    <i class="fas fa-mobile-alt"></i> 9:16
                </button>
            </div>
        </div>

        <!-- Right Side - Details Form -->
        <div class="upload-right">
            <div class="upload-form">
                <!-- User Info -->
                <div class="user-info">
                    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150&h=150&fit=crop&crop=face" alt="User" class="user-avatar">
                    <div class="user-details">
                        <span class="username">sarah_mitchell</span>
                        <select class="visibility-select" id="visibility">
                            <option value="public"><i class="fas fa-globe"></i> Public</option>
                            <option value="followers"><i class="fas fa-users"></i> Followers</option>
                            <option value="private"><i class="fas fa-lock"></i> Private</option>
                        </select>
                    </div>
                </div>

                <!-- Caption -->
                <div class="form-group">
                    <textarea 
                        id="caption" 
                        class="caption-input" 
                        placeholder="Write a caption..."
                        maxlength="2200"
                        oninput="updateCharCount()"
                    ></textarea>
                    <div class="char-count">
                        <span id="charCount">0</span>/2200
                    </div>
                </div>

                <!-- Location -->
                <div class="form-group">
                    <div class="input-with-icon">
                        <i class="fas fa-map-marker-alt"></i>
                        <input type="text" id="location" placeholder="Add location" oninput="searchLocation(this.value)">
                    </div>
                    <div class="location-suggestions" id="locationSuggestions"></div>
                </div>

                <!-- Tags -->
                <div class="form-group">
                    <div class="input-with-icon">
                        <i class="fas fa-user-tag"></i>
                        <input type="text" id="tagPeople" placeholder="Tag people" oninput="searchPeople(this.value)">
                    </div>
                    <div class="tagged-people" id="taggedPeople"></div>
                </div>

                <!-- Advanced Settings -->
                <div class="advanced-settings">
                    <button class="settings-toggle" onclick="toggleSettings()">
                        <span>Advanced Settings</span>
                        <i class="fas fa-chevron-down" id="settingsIcon"></i>
                    </button>
                    
                    <div class="settings-content" id="settingsContent" style="display: none;">
                        <!-- Hide Like Count -->
                        <label class="setting-item">
                            <div class="setting-info">
                                <span>Hide like count</span>
                                <small>Only you will see the total number of likes</small>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="hideLikes">
                                <span class="toggle-slider"></span>
                            </label>
                        </label>

                        <!-- Turn off comments -->
                        <label class="setting-item">
                            <div class="setting-info">
                                <span>Turn off commenting</span>
                                <small>People won't be able to comment on this post</small>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="disableComments">
                                <span class="toggle-slider"></span>
                            </label>
                        </label>

                        <!-- AI Labels -->
                        <label class="setting-item">
                            <div class="setting-info">
                                <span>AI-generated content</span>
                                <small>Label this post as AI-generated</small>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="aiGenerated">
                                <span class="toggle-slider"></span>
                            </label>
                        </label>
                    </div>
                </div>

                <!-- Post Type Indicator -->
                <div class="post-type-indicator" id="postTypeIndicator">
                    <i class="fas fa-image"></i>
                    <span>New Post</span>
                </div>

                <!-- Action Buttons -->
                <div class="form-actions">
                    <button class="btn-draft" onclick="saveDraft()">
                        <i class="fas fa-save"></i> Save Draft
                    </button>
                    <button class="btn-share" id="shareBtn" onclick="sharePost()" disabled>
                        <span>Share</span>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Loading Modal -->
    <div class="modal-overlay" id="loadingModal" style="display: none;">
        <div class="loading-content">
            <div class="spinner"></div>
            <h3>Uploading...</h3>
            <p id="uploadProgress">0%</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal-overlay" id="successModal" style="display: none;">
        <div class="success-content">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            <h3>Posted Successfully!</h3>
            <p>Your post has been shared with your followers.</p>
            <button class="btn-primary" onclick="goHome()">Go to Home</button>
        </div>
    </div>

    <!-- Cropper Modal -->
    <div class="modal-overlay" id="cropperModal" style="display: none;">
        <div class="cropper-content">
            <div class="cropper-header">
                <h3>Crop Image</h3>
                <button onclick="closeCropper()"><i class="fas fa-times"></i></button>
            </div>
            <div class="cropper-body">
                <img id="cropperImage" src="" alt="Crop">
            </div>
            <div class="cropper-footer">
                <button class="btn-secondary" onclick="closeCropper()">Cancel</button>
                <button class="btn-primary" onclick="applyCrop()">Apply</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="js/upload.js"></script>
</body>
</html>
