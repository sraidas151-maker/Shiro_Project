<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Shiro</title>
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-left">
            <div class="auth-brand">
                <div class="logo-icon">
                    <div class="logo-circle"></div>
                    <div class="logo-dot"></div>
                </div>
                <span class="logo-text">shiro</span>
            </div>
            <h1>Welcome back to Shiro</h1>
            <p>Connect with friends, share your moments, and discover new experiences.</p>
            <div class="auth-features">
                <div class="feature">
                    <i class="fas fa-users"></i>
                    <span>Join 10M+ users worldwide</span>
                </div>
                <div class="feature">
                    <i class="fas fa-shield-alt"></i>
                    <span>Secure & private</span>
                </div>
                <div class="feature">
                    <i class="fas fa-bolt"></i>
                    <span>Real-time connections</span>
                </div>
            </div>
        </div>
        
        <div class="auth-right">
            <div class="auth-box">
                <h2>Sign In</h2>
                <p class="auth-subtitle">Enter your credentials to access your account</p>
                
                <form id="loginForm" novalidate>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        </div>
                        <span class="error-message" id="emailError"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" name="password" placeholder="Enter your password" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('password')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="error-message" id="passwordError"></span>
                    </div>
                    
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="btn-auth" id="loginBtn">
                        <span>Sign In</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
                
                <div class="auth-divider">
                    <span>or continue with</span>
                </div>
                
                <div class="social-login">
                    <button class="btn-social google" onclick="socialLogin('google')">
                        <i class="fab fa-google"></i>
                    </button>
                    <button class="btn-social facebook" onclick="socialLogin('facebook')">
                        <i class="fab fa-facebook-f"></i>
                    </button>
                    <button class="btn-social twitter" onclick="socialLogin('twitter')">
                        <i class="fab fa-twitter"></i>
                    </button>
                    <button class="btn-social apple" onclick="socialLogin('apple')">
                        <i class="fab fa-apple"></i>
                    </button>
                </div>
                
                <p class="auth-switch">
                    Don't have an account? <a href="register.html">Create account</a>
                </p>
            </div>
        </div>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>
    
    <script src="js/auth.js"></script>
</body>
</html>
